services:
  cv-filipe:
    build:
      context: .
      dockerfile: Dockerfile
    image: cv-filipe:latest
    container_name: cv-filipe
    restart: unless-stopped
    ports:
      - "8080:80"       # Muda para 80:80 se quiseres na porta standard
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.docker.description=Filipe Fernandes CV Website"
